services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - EQUATIONX_LOG_LEVEL=INFO
      - EQUATIONX_CORS_ORIGINS=http://localhost:3000,http://frontend:80
      - EQUATIONX_RATE_LIMIT=60
      - EQUATIONX_RATE_WINDOW=60
    volumes:
      - equationx_data:/root/.equationx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  equationx_data:
